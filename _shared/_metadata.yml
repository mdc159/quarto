# =============================================================================
# Shared Quarto metadata for all projects in this workspace
# =============================================================================
# Each project's _quarto.yml inherits this file via:
#   metadata-files:
#     - ../../_shared/_metadata.yml
#
# Project-specific values (title, output-dir, render list) belong in the
# project's own _quarto.yml. Anything that should apply identically to ALL
# technical reports in this workspace lives here.
# =============================================================================

# Code execution behavior
execute:
  echo: true
  warning: false
  freeze: auto       # cell outputs are cached; re-run only on source change

# Section / TOC numbering
number-sections: true
number-depth: 3
toc: true
toc-depth: 3

# Bibliography paths are project-specific (declared in each project's
# _quarto.yml so the relative paths resolve from the project directory).
# Common citation behavior is configured here:
link-citations: true

# Cross-reference labels
crossref:
  fig-title: "Figure"
  tbl-title: "Table"
  eq-prefix: "Eq."

# Multi-format output: HTML for interactive review, PDF for formal release
format:
  html:
    theme: cosmo
    toc-location: left
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    code-line-numbers: true
    citation-hover: true       # hover over citations to see full reference
    fig-align: center
    fig-format: svg
    lightbox: true             # click-to-zoom on figures
    fontsize: 1.05em
    linestretch: 1.4
  pdf:
    documentclass: article
    papersize: letter
    fontsize: 10pt
    geometry:
      - margin=0.85in
    colorlinks: true
    fig-align: center
    fig-format: pdf
    fig-dpi: 300
    keep-tex: false
    tbl-cap-location: top
    include-in-header:
      - text: |
          \usepackage{booktabs}
          \usepackage{siunitx}
          \usepackage{array}
          \usepackage{makecell}
          \usepackage{tabularx}
          \usepackage{ltablex}
          \keepXColumns
          % Make all longtables use a smaller font so wide content fits
          \AtBeginEnvironment{longtable}{\footnotesize}
          % Slightly looser row spacing for readability
          \renewcommand{\arraystretch}{1.15}
          % Tighter spacing around longtables
          \setlength{\LTpre}{6pt}
          \setlength{\LTpost}{6pt}
          % Force URLs to break inside cells
          \usepackage{xurl}
          \urlstyle{same}
